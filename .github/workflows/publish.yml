name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # optional: only if your npm token was restricted to a GitHub environment
    # environment: production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (with OIDC auth support)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: npm
          always-auth: true

      - name: Install Dependencies
        run: npm ci

      - name: Build Package
        run: npm run build

      - name: Verify Package
        run: npm pack --dry-run

      - name: Publish Package
        run: npm publish --provenance --access public